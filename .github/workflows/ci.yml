name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout lint-pdf fixtures
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: printwithsynergy/lint-pdf
          path: lint-pdf
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install codex-pdf with geom + redis extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[redis,geom]" pytest pytest-asyncio httpx
      - name: Producer-surface audit (codex stays read-only)
        run: python scripts/produce_surface_audit.py --json reports/audit/produce_surface.json
      - name: Test
        run: pytest
      - name: Parity Gate (Deep Profile)
        run: |
          python - <<'PY'
          import fitz
          from pathlib import Path
          root = Path("tmp-parity")
          root.mkdir(exist_ok=True)
          path = root / "fixture.pdf"
          doc = fitz.open()
          page = doc.new_page(width=612, height=792)
          page.insert_text((72, 72), "codex parity fixture")
          doc.save(path)
          PY
          codex-pdf parity --fixtures-root tmp-parity --profile deep --max-files 5
